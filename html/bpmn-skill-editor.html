/**
 * color definitions
 */
.djs-parent {
  --color-grey-225-10-15: hsl(225, 10%, 15%);
  --color-grey-225-10-35: hsl(225, 10%, 35%);
  --color-grey-225-10-55: hsl(225, 10%, 55%);
  --color-grey-225-10-75: hsl(225, 10%, 75%);
  --color-grey-225-10-80: hsl(225, 10%, 80%);
  --color-grey-225-10-85: hsl(225, 10%, 85%);
  --color-grey-225-10-90: hsl(225, 10%, 90%);
  --color-grey-225-10-95: hsl(225, 10%, 95%);
  --color-grey-225-10-97: hsl(225, 10%, 97%);

  --color-blue-205-100-45: hsl(205, 100%, 45%);
  --color-blue-205-100-45-opacity-30: hsla(205, 100%, 45%, 30%);
  --color-blue-205-100-50: hsl(205, 100%, 50%);
  --color-blue-205-100-50-opacity-15: hsla(205, 100%, 50%, 15%);
  --color-blue-205-100-70: hsl(205, 100%, 75%);
  --color-blue-205-100-95: hsl(205, 100%, 95%);

  --color-green-150-86-44: hsl(150, 86%, 44%);

  --color-red-360-100-40: hsl(360, 100%, 40%);
  --color-red-360-100-45: hsl(360, 100%, 45%);
  --color-red-360-100-92: hsl(360, 100%, 92%);
  --color-red-360-100-97: hsl(360, 100%, 97%);

  --color-white: hsl(0, 0%, 100%);
  --color-black: hsl(0, 0%, 0%);
  --color-black-opacity-10: hsla(0, 0%, 0%, 10%);
  --color-black-opacity-30: hsla(0, 0%, 0%, 30%);

  --canvas-fill-color: var(--color-white);

  --bendpoint-fill-color: var(--color-blue-205-100-45);
  --bendpoint-stroke-color: var(--canvas-fill-color);

  --context-pad-entry-background-color: var(--color-white);
  --context-pad-entry-hover-background-color: var(--color-grey-225-10-95);

  --element-dragger-color: var(--color-blue-205-100-50);
  --element-hover-outline-fill-color: var(--color-blue-205-100-45);
  --element-selected-outline-stroke-color: var(--color-blue-205-100-50);
  --element-selected-outline-secondary-stroke-color: var(--color-blue-205-100-70);

  --lasso-fill-color: var(--color-blue-205-100-50-opacity-15);
  --lasso-stroke-color: var(--element-selected-outline-stroke-color);

  --palette-entry-color: var(--color-grey-225-10-15);
  --palette-entry-hover-color: var(--color-blue-205-100-45);
  --palette-entry-selected-color: var(--color-blue-205-100-50);
  --palette-separator-color: var(--color-grey-225-10-75);
  --palette-toggle-hover-background-color: var(--color-grey-225-10-55);
  --palette-background-color: var(--color-grey-225-10-97);
  --palette-border-color: var(--color-grey-225-10-75);

  --popup-font-family: "IBM Plex Sans", sans-serif;
  --popup-font-size: 14px;
  --popup-header-entry-selected-color: var(--color-blue-205-100-50);
  --popup-header-font-weight: bolder;
  --popup-header-group-divider-color: var(--color-grey-225-10-75);
  --popup-background-color: var(--color-white);
  --popup-border-color: transparent;
  --popup-shadow-color: var(--color-black-opacity-30);
  --popup-disabled-color: var(--color-grey-225-10-35);
  --popup-description-color: var(--color-grey-225-10-35);
  --popup-no-results-color: var(--color-grey-225-10-55);
  --popup-entry-title-color: var(--color-grey-225-10-55);
  --popup-entry-hover-color:  var(--color-grey-225-10-95);
  --popup-search-border-color: var(--color-grey-225-10-75);
  --popup-search-focus-border-color: var(--color-blue-205-100-50);
  --popup-search-focus-background-color: var(--color-blue-205-100-95);

  --resizer-fill-color: var(--color-blue-205-100-45);
  --resizer-stroke-color: var(--canvas-fill-color);

  --search-font-family: "IBM Plex Sans", sans-serif;
  --search-font-size: 14px;
  --search-container-background-color: var(--color-white);
  --search-shadow-color: var(--color-black-opacity-30);
  --search-input-border-color: var(--color-grey-225-10-75);
  --search-input-focus-border-color: var(--color-blue-205-100-50);
  --search-input-focus-background-color: var(--color-blue-205-100-95);
  --search-result-hover-background-color: var(--color-grey-225-10-95);
  --search-result-secondary-color: var(--color-grey-225-10-55);
  --search-preselected-background-color: var(--color-blue-205-100-50-opacity-15);

  --shape-attach-allowed-stroke-color: var(--color-blue-205-100-50);
  --shape-connect-allowed-fill-color: var(--color-grey-225-10-97);
  --shape-drop-allowed-fill-color: var(--color-grey-225-10-97);
  --shape-drop-not-allowed-fill-color: var(--color-red-360-100-97);
  --shape-resize-preview-stroke-color: var(--color-blue-205-100-50);

  --snap-line-stroke-color: var(--color-blue-205-100-45-opacity-30);

  --space-tool-crosshair-stroke-color: var(--color-black);

  --tooltip-error-background-color: var(--color-red-360-100-97);
  --tooltip-error-border-color: var(--color-red-360-100-45);
  --tooltip-error-color: var(--color-red-360-100-45);
}

/**
 * SVG styles
 */

.djs-container svg.drop-not-ok {
  background: var(--shape-drop-not-allowed-fill-color) !important;
}

.djs-container svg.new-parent {
  background: var(--shape-drop-allowed-fill-color) !important;
}

.djs-container svg:focus {
  outline-offset: -1px;
}

/**
 * outline styles
 */

.djs-outline,
.djs-selection-outline {
  fill: none;
  shape-rendering: geometricPrecision;
  stroke-width: 2px;
}

.djs-outline {
  visibility: hidden;
}

.djs-selection-outline {
  stroke: var(--element-selected-outline-stroke-color);
}

.djs-element.selected .djs-outline {
  visibility: visible;

  stroke: var(--element-selected-outline-stroke-color);
}

.djs-connection.selected .djs-outline {
  display: none;
}

.djs-multi-select .djs-element.selected .djs-outline,
.djs-dragging-active-lasso .djs-element.selected .djs-outline {
  stroke: var(--element-selected-outline-secondary-stroke-color);
  display: block;
}

.djs-shape.connect-ok .djs-visual > :nth-child(1) {
  fill: var(--shape-connect-allowed-fill-color) !important;
}

.djs-shape.connect-not-ok .djs-visual > :nth-child(1),
.djs-shape.drop-not-ok .djs-visual > :nth-child(1) {
  fill: var(--shape-drop-not-allowed-fill-color) !important;
}

.djs-shape.new-parent .djs-visual > :nth-child(1) {
  fill: var(--shape-drop-allowed-fill-color) !important;
}


/* Override move cursor during drop and connect */
.drop-not-ok,
.connect-not-ok,
.drop-not-ok *,
.connect-not-ok * {
  cursor: not-allowed !important;
}

.drop-ok,
.connect-ok,
.drop-ok *,
.connect-ok * {
  cursor: default !important;
}

.djs-element.attach-ok .djs-visual > :nth-child(1) {
  stroke-width: 5px !important;
  stroke: var(--shape-attach-allowed-stroke-color) !important;
}

.djs-frame.connect-not-ok .djs-visual > :nth-child(1),
.djs-frame.drop-not-ok .djs-visual > :nth-child(1) {
  stroke-width: 3px !important;
  stroke: var(--shape-drop-not-allowed-fill-color) !important;
  fill: none !important;
}

/**
* Selection box style
*
*/
.djs-lasso-overlay {
  fill: var(--lasso-fill-color);
  stroke: var(--lasso-stroke-color);
  stroke-width: 2px;
  shape-rendering: geometricPrecision;
  pointer-events: none;
}

/**
 * Resize styles
 */
.djs-resize-overlay {
  fill: none;

  stroke-dasharray: 5 1 3 1;
  stroke: var(--shape-resize-preview-stroke-color);

  pointer-events: none;
}

.djs-resizer-hit {
  fill: none;
  pointer-events: all;
}

.djs-resizer-visual {
  fill: var(--resizer-fill-color);
  stroke-width: 1px;
  stroke: var(--resizer-stroke-color);
  shape-rendering: geometricPrecision;
}

.djs-resizer:hover .djs-resizer-visual {
  stroke: var(--resizer-stroke-color);
  stroke-opacity: 1;
}

.djs-cursor-resize-ns,
.djs-resizer-n,
.djs-resizer-s {
  cursor: ns-resize;
}

.djs-cursor-resize-ew,
.djs-resizer-e,
.djs-resizer-w {
  cursor: ew-resize;
}

.djs-cursor-resize-nwse,
.djs-resizer-nw,
.djs-resizer-se {
  cursor: nwse-resize;
}

.djs-cursor-resize-nesw,
.djs-resizer-ne,
.djs-resizer-sw {
  cursor: nesw-resize;
}

.djs-shape.djs-resizing > .djs-outline {
  visibility: hidden !important;
}

.djs-shape.djs-resizing > .djs-resizer {
  visibility: hidden;
}

.djs-dragger > .djs-resizer {
  visibility: hidden;
}

/**
 * drag styles
 */
.djs-dragger * {
  fill: none !important;
  stroke: var(--element-dragger-color) !important;
}

.djs-dragger tspan,
.djs-dragger text {
  fill: var(--element-dragger-color) !important;
  stroke: none !important;
}

.djs-dragger marker circle,
.djs-dragger marker path,
.djs-dragger marker polygon,
.djs-dragger marker polyline,
.djs-dragger marker rect {
  fill: var(--element-dragger-color) !important;
  stroke: none !important;
}

.djs-dragger marker text,
.djs-dragger marker tspan {
  fill: none !important;
  stroke: var(--element-dragger-color) !important;
}

.djs-dragging,
.djs-dragging > * {
  opacity: 0.3 !important;
  pointer-events: none !important;
}

/**
 * no pointer events for visual
 */
.djs-visual,
.djs-outline {
  pointer-events: none;
}

.djs-element.attach-ok .djs-hit {
  stroke-width: 60px !important;
}

/**
 * all pointer events for hit shape
 */
.djs-element > .djs-hit-all,
.djs-element > .djs-hit-no-move {
  pointer-events: all;
}

.djs-element > .djs-hit-stroke,
.djs-element > .djs-hit-click-stroke {
  pointer-events: stroke;
}

/**
 * shape / connection basic styles
 */
.djs-connection .djs-visual {
  stroke-width: 2px;
  fill: none;
}

.djs-cursor-grab {
  cursor: -webkit-grab;
  cursor: -moz-grab;
  cursor: grab;
}

.djs-cursor-grabbing {
  cursor: -webkit-grabbing;
  cursor: -moz-grabbing;
  cursor: grabbing;
}

.djs-cursor-crosshair {
  cursor: crosshair;
}

.djs-cursor-move {
  cursor: move;
}

.djs-cursor-resize-ns {
  cursor: ns-resize;
}

.djs-cursor-resize-ew {
  cursor: ew-resize;
}


/**
 * snapping
 */
.djs-snap-line {
  stroke: var(--snap-line-stroke-color);
  stroke-linecap: round;
  stroke-width: 2px;
  pointer-events: none;
}

/**
 * snapping
 */
.djs-crosshair {
  stroke: var(--space-tool-crosshair-stroke-color);
  stroke-linecap: round;
  stroke-width: 1px;
  pointer-events: none;
  shape-rendering: geometricPrecision;
  stroke-dasharray: 5, 5;
}

/**
 * palette
 */

.djs-palette {
  position: absolute;
  left: 20px;
  top: 20px;

  box-sizing: border-box;
  width: 48px;
}

.djs-palette .separator {
  margin: 5px;
  padding-top: 5px;

  border: none;
  border-bottom: solid 1px var(--palette-separator-color);

  clear: both;
}

.djs-palette .entry:before {
  vertical-align: initial;
}

.djs-palette .djs-palette-toggle {
  cursor: pointer;
}

.djs-palette .entry,
.djs-palette .djs-palette-toggle {
  color: var(--palette-entry-color);
  font-size: 30px;

  text-align: center;
}

.djs-palette .entry {
  float: left;
}

.djs-palette .entry img {
  max-width: 100%;
}

.djs-palette .djs-palette-entries:after {
  content: '';
  display: table;
  clear: both;
}

.djs-palette .djs-palette-toggle:hover {
  background: var(--palette-toggle-hover-background-color);
}

.djs-palette .entry:hover {
  color: var(--palette-entry-hover-color);
}

.djs-palette .highlighted-entry {
  color: var(--palette-entry-selected-color) !important;
}

.djs-palette .entry,
.djs-palette .djs-palette-toggle {
  width: 46px;
  height: 46px;
  line-height: 46px;
  cursor: default;
}

/**
 * Palette open / two-column layout is controlled via
 * classes on the palette. Events to hook into palette
 * changed life-cycle are available in addition.
 */
.djs-palette.two-column.open {
  width: 94px;
}

.djs-palette:not(.open) .djs-palette-entries {
  display: none;
}

.djs-palette:not(.open) {
  overflow: hidden;
}

.djs-palette.open .djs-palette-toggle {
  display: none;
}

/**
 * context-pad
 */
.djs-context-pad {
  position: absolute;
  display: none;
  pointer-events: none;
  line-height: 1;
  width: 72px;
  z-index: 100;
}

.djs-context-pad .entry {
  width: 22px;
  height: 22px;
  text-align: center;
  display: inline-block;
  font-size: 22px;
  margin: 0 2px 2px 0;

  border-radius: 3px;

  cursor: default;

  background-color: var(--context-pad-entry-background-color);
  box-shadow: 0 0 2px 1px var(--context-pad-entry-background-color);
  pointer-events: all;
  vertical-align: middle;
}

.djs-context-pad .entry:hover {
  background: var(--context-pad-entry-hover-background-color);
}

.djs-context-pad.open {
  display: block;
}

/**
 * popup styles
 */
.djs-popup {
  line-height: 1;
  box-sizing: border-box;
  width: min-content;
  background: var(--popup-background-color);
  overflow: hidden;
  position: fixed;
  z-index: 200;
  box-shadow: 0px 2px 6px var(--popup-shadow-color);
  border: solid 1px var(--popup-border-color);
  min-width: 120px;
  outline: none;
  font-size: var(--popup-font-size);
  font-family: var(--popup-font-family);
}

.djs-popup-search input {
  width: 100%;
  box-sizing: border-box;
  font-size: var(--popup-font-size);
  padding: 3px 6px 3px 28px;
  border-radius: 2px;
  border: solid 1px var(--popup-search-border-color);
  line-height: 21px;
}

.djs-popup-search input:focus {
  background-color: var(--popup-search-focus-background-color);
  border: solid 1px var(--popup-search-focus-border-color);
  outline: none;
}

.djs-popup-header {
  display: flex;
  align-items: stretch;
  line-height: 20px;
  margin: 10px 12px 10px 12px;
}

.djs-popup-header .entry {
  border-radius: 2px;
}

.djs-popup button.entry {
  padding: 0;
  background: transparent;
  border: 0;
}

.djs-popup-header .entry.active {
  color: var(--popup-header-entry-selected-color);
}

.djs-popup-header .entry.disabled {
  color: inherit;
}

.djs-popup-header-group {
  display: flex;
  flex-direction: row;
  align-items: center;
  list-style: none;
  margin: 0;
  padding: 0;
}

.djs-popup-header-group .entry {
  display: flex;
  flex-direction: row;
  align-items: center;
}

.djs-popup-header-group + .djs-popup-header-group:before {
  content: '';
  width: 1px;
  height: 20px;
  background: var(--popup-header-group-divider-color);
  margin: 0 5px;
}

.djs-popup-search {
  position: relative;
  width: auto;
  margin: 10px 12px;
}

.djs-popup-title {
  font-size: var(--popup-font-size);
  font-weight: var(--popup-header-font-weight);
  flex: 1;
  margin: 0;
}

.djs-popup-breadcrumbs {
  display: flex;
  line-height: 20px;
  margin: 10px 12px;
}

.djs-popup-breadcrumbs-item {
  display: inline-flex;
  min-width: 0;
  padding: 0;
  margin: 0;
  background: transparent;
  border: 0;
  outline: none;
  appearance: none;
  color: var(--popup-description-color);
  font: inherit;
  cursor: pointer;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.djs-popup-breadcrumbs-item--separator::before {
  display: inline-block;
  content: '/';
  color: var(--popup-description-color);
  margin: 0 4px;
}

.djs-popup-breadcrumbs-item:hover {
  color: inherit;
  text-decoration: underline;
}

.djs-popup-breadcrumbs-item:focus-visible {
  outline: 1px solid var(--popup-search-focus-border-color);
  outline-offset: 2px;
}

.djs-popup-breadcrumbs-item--back {
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 2px 3px;
  margin-right: 6px;
  border: 1px solid var(--popup-search-border-color);
  border-radius: 4px;
}

.djs-popup-breadcrumbs-item--back:hover {
  background: #f2f3f5;
}

.djs-popup-breadcrumbs-item--current {
  font-weight: var(--popup-header-font-weight);
  color: inherit;
  cursor: default;
}

.djs-popup-breadcrumbs-item--current:hover {
  text-decoration: none;
}

.djs-popup-entry-chevron {
  display: flex;
  align-items: center;
  margin-left: 6px;
  color: var(--popup-description-color);
}

.djs-popup-search-icon {
  position: absolute;
  left: 8px;
  top: 7px;
}

.djs-popup-search-count {
  margin: 0 12px;
  font-size: 11px;
  color: var(--popup-description-color);
}

.djs-popup-results {
  margin: 7px 3px 7px 12px;
  list-style: none;
  max-height: 280px;
  overflow: auto;
  padding-right: 9px;
}

.djs-popup-group {
  margin: 0;
  padding: 0;
  width: 100%;
}

.djs-popup-body .entry,
.djs-popup-body .entry-header {
  padding: 5px 7px;
  cursor: default;
  border-radius: 4px;
}

.djs-popup-body .entry-header {
  font-weight: var(--popup-header-font-weight);
  color: var(--popup-entry-title-color);
  padding-left: 0;
}

.djs-popup [class*="icon"] .djs-popup-label,
.djs-popup-label:not(:first-child) {
  margin-left: .5em;
}

.djs-popup [class*="icon"]:before,
.djs-popup-entry-icon {
  width: 1em;
  height: 1em;
  display: inline-block;
  font-size: 1.4em;
  vertical-align: middle;
}

.djs-popup-body .entry-header:not(:first-child) {
  margin-top: 8px;
  margin-bottom: 2px;
}

.djs-popup-body .entry {
  display: flex;
  flex-direction: row;
  align-items: stretch;

<script>
const BLANK_XML = "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<definitions xmlns=\"http://www.omg.org/spec/BPMN/20100524/MODEL\"\n  xmlns:bpmndi=\"http://www.omg.org/spec/BPMN/20100524/DI\"\n  xmlns:omgdc=\"http://www.omg.org/spec/DD/20100524/DC\"\n  xmlns:omgdi=\"http://www.omg.org/spec/DD/20100524/DI\"\n  targetNamespace=\"http://www.example.org/test\">\n  <process id=\"Process_1\" isExecutable=\"true\">\n    <startEvent id=\"StartEvent_1\" name=\"Start\"><outgoing>Flow_1</outgoing></startEvent>\n    <task id=\"Task_1\" name=\"Uppgift\"><incoming>Flow_1</incoming><outgoing>Flow_2</outgoing></task>\n    <endEvent id=\"EndEvent_1\" name=\"Slut\"><incoming>Flow_2</incoming></endEvent>\n    <sequenceFlow id=\"Flow_1\" sourceRef=\"StartEvent_1\" targetRef=\"Task_1\"/>\n    <sequenceFlow id=\"Flow_2\" sourceRef=\"Task_1\" targetRef=\"EndEvent_1\"/>\n  </process>\n  <bpmndi:BPMNDiagram id=\"BPMNDiagram_1\">\n    <bpmndi:BPMNPlane id=\"BPMNPlane_1\" bpmnElement=\"Process_1\">\n      <bpmndi:BPMNShape id=\"StartEvent_1_di\" bpmnElement=\"StartEvent_1\">\n        <omgdc:Bounds x=\"152\" y=\"192\" width=\"36\" height=\"36\"/>\n        <bpmndi:BPMNLabel><omgdc:Bounds x=\"145\" y=\"235\" width=\"50\" height=\"14\"/></bpmndi:BPMNLabel>\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"Task_1_di\" bpmnElement=\"Task_1\">\n        <omgdc:Bounds x=\"250\" y=\"170\" width=\"120\" height=\"80\"/>\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNShape id=\"EndEvent_1_di\" bpmnElement=\"EndEvent_1\">\n        <omgdc:Bounds x=\"432\" y=\"192\" width=\"36\" height=\"36\"/>\n        <bpmndi:BPMNLabel><omgdc:Bounds x=\"425\" y=\"235\" width=\"50\" height=\"14\"/></bpmndi:BPMNLabel>\n      </bpmndi:BPMNShape>\n      <bpmndi:BPMNEdge id=\"Flow_1_di\" bpmnElement=\"Flow_1\">\n        <omgdi:waypoint x=\"188\" y=\"210\"/><omgdi:waypoint x=\"250\" y=\"210\"/>\n      </bpmndi:BPMNEdge>\n      <bpmndi:BPMNEdge id=\"Flow_2_di\" bpmnElement=\"Flow_2\">\n        <omgdi:waypoint x=\"370\" y=\"210\"/><omgdi:waypoint x=\"432\" y=\"210\"/>\n      </bpmndi:BPMNEdge>\n    </bpmndi:BPMNPlane>\n  </bpmndi:BPMNDiagram>\n</definitions>";

let modeler = null;

// ── Init ──────────────────────────────────────────────────
function initModeler() {
  modeler = new BpmnJS({
    container: '#bpmnCanvas',
    keyboard: { bindTo: window },
  });
  modeler.on('commandStack.changed', () => { syncMd(); updateUR(); });
  modeler.on('import.done', ({ error }) => {
    if (error) { setSt('err','&#10060;','Import misslyckades',error.message); return; }
    zoomFit();
    updateUR();
    setSt('ok','&#9989;','Redo','Rita processfl\u00f6det och spara med \ud83d\udce6 ZIP.');
  });
  loadXml(BLANK_XML);
}

async function loadXml(xml) {
  try { await modeler.importXML(xml); }
  catch(e) { setSt('err','&#10060;','XML-fel',e.message); }
}

// ── Toolbar ───────────────────────────────────────────────
function zoomIn()    { modeler.get('zoomScroll').stepZoom(1); }
function zoomOut()   { modeler.get('zoomScroll').stepZoom(-1); }
function zoomFit()   { modeler.get('canvas').zoom('fit-viewport','auto'); }
function zoomReset() { modeler.get('canvas').zoom(1,'auto'); }
function doUndo()    { try{ modeler.get('commandStack').undo(); }catch(e){} }
function doRedo()    { try{ modeler.get('commandStack').redo(); }catch(e){} }
function updateUR() {
  try {
    const cs = modeler.get('commandStack');
    document.getElementById('undoBtn').style.opacity = cs.canUndo()?'1':'.4';
    document.getElementById('redoBtn').style.opacity = cs.canRedo()?'1':'.4';
  } catch(e) {}
}
function alignH() {
  const s = modeler.get('selection').get();
  if (s.length>1) try{ modeler.get('alignElements').trigger(s,'center'); }catch(e){}
}
function alignV() {
  const s = modeler.get('selection').get();
  if (s.length>1) try{ modeler.get('alignElements').trigger(s,'middle'); }catch(e){}
}
function delSelected() {
  const s = modeler.get('selection').get();
  if (s.length) modeler.get('modeling').removeElements(s.slice());
}
function newDiagram() {
  if (!confirm('Nytt tomt diagram? Osparade \u00e4ndringar f\u00f6rsvinner.')) return;
  loadXml(BLANK_XML);
}

// ── Export ────────────────────────────────────────────────
async function getXml() {
  try { const {xml} = await modeler.saveXML({format:true}); return xml; } catch(e) { return null; }
}
async function getSvg() {
  try { const {svg} = await modeler.saveSVG(); return svg; } catch(e) { return null; }
}
function svgToPng(svgStr) {
  return new Promise(resolve => {
    const bg = svgStr.replace(/<svg([^>]*)>/, '<svg$1><rect width="100%" height="100%" fill="white"/>');
    const blob = new Blob([bg],{type:'image/svg+xml;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      const w=img.naturalWidth||1200, h=img.naturalHeight||800;
      const c=document.createElement('canvas');
      c.width=w*2; c.height=h*2;
      const ctx=c.getContext('2d');
      ctx.scale(2,2); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url); resolve(c.toDataURL('image/png'));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

async function exportXml() {
  const x = await getXml(); if(x) dl(new Blob([x],{type:'application/xml'}),(gv('sName')||'diagram')+'.bpmn');
}
async function exportSvg() {
  const s = await getSvg(); if(s) dl(new Blob([s],{type:'image/svg+xml'}),(gv('sName')||'diagram')+'.svg');
}
async function exportPng() {
  setSt('run','<span class="spin"></span>','Genererar PNG\u2026','');
  const svg=await getSvg(); if(!svg){setSt('err','&#10060;','Misslyckades','');return;}
  const png=await svgToPng(svg); if(!png){setSt('err','&#10060;','Misslyckades','');return;}
  dl(du2blob(png),(gv('sName')||'diagram')+'.png');
  setSt('ok','&#9989;','PNG nedladdad',''); setTimeout(()=>setSt('','\u2139\ufe0f','Redo',''),2000);
}

// ── ZIP ───────────────────────────────────────────────────
async function doZip() {
  const name = gv('sName')||'bpmn-skill';
  setSt('run','<span class="spin"></span>','Skapar ZIP\u2026','');
  const xml=await getXml(), svg=await getSvg(), png=svg?await svgToPng(svg):null;

  const zip=new JSZip(), f=zip.folder(name);
  const md = buildMd().replace('BPMN_XML_PLACEHOLDER', xml||'');
  f.file('SKILL.md', md);
  if(xml) f.file('diagram.bpmn', xml);
  if(svg) f.file('diagram.svg', svg);
  if(png) f.file('diagram.png', du2blob(png));
  f.file('meta.json', JSON.stringify({
    skillName:gv('sName'),skillVersion:gv('sVer'),
    skillDescription:gv('sDesc'),skillAuthor:gv('sAuth'),skillLicense:gv('sLic'),
  },null,2));

  dl(await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}}), name+'.zip');
  setSt('ok','\ud83d\udce6',name+'.zip nedladdad','SKILL.md \u00b7 diagram.bpmn \u00b7 diagram.svg \u00b7 diagram.png \u00b7 meta.json');
  setTimeout(()=>setSt('','\u2139\ufe0f','Redo',''),3500);
}

document.getElementById('zipIn').addEventListener('change', async e => {
  const file=e.target.files[0]; if(!file) return; e.target.value='';
  if(file.name.match(/\.(bpmn|xml)$/i)) {
    setSt('run','<span class="spin"></span>','Importerar\u2026','');
    await loadXml(await file.text()); syncMd(); return;
  }
  setSt('run','<span class="spin"></span>','\u00d6ppnar ZIP\u2026','');
  try {
    const zip=await JSZip.loadAsync(await file.arrayBuffer());
    let pfx='';
    zip.forEach(p=>{ if(!pfx&&p.endsWith('/')&&p.indexOf('/',1)<0) pfx=p; });
    const get=async n=>zip.file(pfx+n)||zip.file(n)||null;
    const mf=await get('meta.json');
    if(mf){
      const m=JSON.parse(await mf.async('string'));
      [['sName','skillName'],['sVer','skillVersion'],['sDesc','skillDescription'],
       ['sAuth','skillAuthor'],['sLic','skillLicense']].forEach(([id,k])=>{
        const el=document.getElementById(id); if(el) el.value=m[k]||'';
      });
    }
    const bf=await get('diagram.bpmn')||await get('diagram.xml');
    if(bf) await loadXml(await bf.async('string'));
    const mdf=await get('SKILL.md');
    if(mdf) document.getElementById('mdOut').value=await mdf.async('string');
    else syncMd();
    setSt('ok','\ud83d\udcc2',file.name+' \u00f6ppnat','Diagram och metadata \u00e5terst\u00e4llda.');
  } catch(err) { setSt('err','&#10060;','Fel',err.message); }
});

// ── SKILL.md ──────────────────────────────────────────────
function syncMd() { document.getElementById('mdOut').value=buildMd(); }

function buildMd() {
  const n=gv('sName')||'bpmn-skill', v=gv('sVer'), d=gv('sDesc'), a=gv('sAuth'), l=gv('sLic');
  let fm='---\nname: '+n+'\n';
  if(d) fm+='description: >\n  '+d.replace(/\n/g,'\n  ')+'\n';
  if(v) fm+='version: '+v+'\n';
  if(a) fm+='author: '+a+'\n';
  if(l) fm+='license: '+l+'\n';
  fm+='---\n\n';
  let b='';
  if(d) b+='## Beskrivning\n\n'+d+'\n\n';
  b+='## Processdiagram\n\n!['+n+'](diagram.png)\n\n';
  b+='## BPMN XML\n\n```xml\nBPMN_XML_PLACEHOLDER\n```\n';
  return fm+b;
}

// ── Tabs ──────────────────────────────────────────────────
function stab(t) {
  ['meta','md'].forEach(x=>{
    document.getElementById('tab'+x[0].toUpperCase()+x.slice(1)).classList.toggle('on',x===t);
    document.getElementById('pane'+x[0].toUpperCase()+x.slice(1)).classList.toggle('on',x===t);
  });
}

// ── Misc ──────────────────────────────────────────────────
function resetAll() {
  if(!confirm('B\u00f6rja om? Osparade \u00e4ndringar f\u00f6rsvinner.')) return;
  ['sName','sVer','sDesc','sAuth','sLic'].forEach(id=>document.getElementById(id).value='');
  loadXml(BLANK_XML); syncMd();
}
function gv(id){return document.getElementById(id).value.trim();}
function cpMd(){
  const b=document.getElementById('cpBtn');
  navigator.clipboard.writeText(document.getElementById('mdOut').value);
  b.textContent='\u2713 Kopierat'; b.classList.add('ok');
  setTimeout(()=>{b.textContent='Kopiera';b.classList.remove('ok');},2000);
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}
function du2blob(du){const[h,d]=du.split(','),mime=h.match(/:(.*?);/)[1],bytes=atob(d),arr=new Uint8Array(bytes.length);for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);return new Blob([arr],{type:mime});}
function setSt(cls,icon,title,sub){
  const b=document.getElementById('sb'); b.className=cls||'';
  b.innerHTML='<span class="si">'+icon+'</span><div class="sm"><strong>'+title+'</strong><span>'+sub+'</span></div>'+
    '<div class="acts"><button class="bs" onclick="exportPng()">\u2b07 PNG</button>'+
    '<button class="bp" onclick="doZip()">\ud83d\udce6 Spara ZIP</button>'+
    '<button class="bs" onclick="resetAll()">\u21ba B\u00f6rja om</button></div>';
}
function toggleTheme(){
  const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n); localStorage.setItem('gs-theme',n);
}
document.addEventListener('DOMContentLoaded',()=>{
  document.documentElement.setAttribute('data-theme',localStorage.getItem('gs-theme')||'light');
  initModeler(); syncMd();
});
